services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.poscountr.com/api/v1}
        VITE_APP_STAGE: production
    image: poscountr-ui:latest
    ports:
      - '8080:80'
    restart: unless-stopped
