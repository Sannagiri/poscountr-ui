# Production nginx config — serves the Vite static build.
# See POSCountr-UI-Planning/poscountr-ui-docker-plan.md §5 for the full rationale.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 512;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hashed build assets are immutable — cache forever.
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html must always be revalidated so a new deploy is picked up.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Client-side routing fallback — React Router owns everything under /.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
