services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api-stage.poscountr.com/api/v1}
        VITE_APP_STAGE: stage
    image: poscountr-ui:stage
    ports:
      - '8300:80'
    restart: unless-stopped
